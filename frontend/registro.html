<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — Conocimiento Abierto</title>
    <link rel="stylesheet" href="css/styles.css?v=20260613l">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="sidebar-brand-icon" style="width:56px;height:56px;font-size:28px;margin:0 auto 16px;">📚</div>
                <h1 class="login-title">Crear cuenta</h1>
                <p class="login-subtitle">Conocimiento Abierto — Biblioteca Universitaria</p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="reg-nombre">Nombre</label>
                    <input type="text" class="form-input" id="reg-nombre" placeholder="Ej: María" autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-apellido">Apellido</label>
                    <input type="text" class="form-input" id="reg-apellido" placeholder="Ej: Gómez" autocomplete="family-name">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-dni">DNI</label>
                <input type="text" class="form-input" id="reg-dni" placeholder="Ej: 40123456" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-email">Email institucional</label>
                <input type="email" class="form-input" id="reg-email" placeholder="usuario@universidad.edu.ar" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-password">Contraseña</label>
                <input type="password" class="form-input" id="reg-password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-rol">Soy</label>
                <select class="form-input form-select" id="reg-rol">
                    <option value="ESTUDIANTE">Estudiante</option>
                    <option value="DOCENTE">Docente</option>
                </select>
            </div>

            <button class="btn btn-primary login-btn" id="btn-registro">
                Registrarme
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
            </button>

            <div class="login-divider"><span>¿Ya tenés cuenta?</span></div>

            <a href="login.html" class="btn btn-secondary login-btn">Iniciar sesión</a>

            <p class="login-note">Solo estudiantes y docentes pueden registrarse aquí. Las cuentas de personal las crea un bibliotecario o administrador.</p>
        </div>
    </div>

    <script src="js/api.js?v=20260613l"></script>
    <script src="js/registro.js?v=20260613l"></script>
</body>
</html>
