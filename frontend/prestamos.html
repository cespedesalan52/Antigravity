<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel bibliotecario para registrar préstamos de libros a usuarios en Conocimiento Abierto.">
    <title>Préstamos — Conocimiento Abierto</title>
    <link rel="stylesheet" href="css/styles.css?v=20260616a">
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="app-layout">

        <!-- ── Main Content ─────────────────────────────── -->
        <main class="main-content">
            <header class="page-header">
                <h2>Registrar Préstamo</h2>
                <p>Panel bibliotecario — Ingresa los datos del usuario y el libro a prestar</p>
            </header>

            <div class="form-panel">
                <!-- ── Campo: Usuario (por DNI o nombre) ───────────── -->
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <div class="form-row">
                        <div class="form-group" style="margin-bottom:0">
                            <input
                                type="text"
                                class="form-input"
                                id="input-dni"
                                placeholder="Buscar por DNI — Ej: 45"
                                autocomplete="off"
                                inputmode="numeric"
                            >
                        </div>
                        <div class="form-group" style="margin-bottom:0">
                            <input
                                type="text"
                                class="form-input"
                                id="input-nombre"
                                placeholder="Buscar por nombre o apellido — Ej: Alan"
                                autocomplete="off"
                            >
                        </div>
                    </div>
                    <div class="form-hint">Buscá por DNI o por nombre y elegí al usuario de la lista. Si escribís el DNI completo se selecciona solo.</div>
                    <div id="preview-usuario"></div>
                </div>

                <!-- ── Campo: ID del Libro ──────────────── -->
                <div class="form-group">
                    <label class="form-label" for="input-libro-id">ID del Libro</label>
                    <input
                        type="number"
                        class="form-input"
                        id="input-libro-id"
                        placeholder="Ej: 1"
                        min="1"
                        autocomplete="off"
                    >
                    <div class="form-hint">ID del libro a prestar — se verificará la disponibilidad</div>
                    <div id="preview-libro"></div>
                </div>

                <!-- ── Botón Submit ──────────────────────── -->
                <button class="btn btn-primary" id="btn-prestar" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <line x1="9" y1="15" x2="15" y2="15"/>
                    </svg>
                    Registrar Préstamo
                </button>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js?v=20260616a"></script>
    <script>renderSidebar('prestamos')</script>
    <script src="js/api.js?v=20260616a"></script>
    <script src="js/prestamos.js?v=20260616a"></script>
</body>
</html>
