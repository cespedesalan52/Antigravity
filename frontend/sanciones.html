<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de sanciones — Conocimiento Abierto. Consultar y saldar multas por mora.">
    <title>Sanciones — Conocimiento Abierto</title>
    <link rel="stylesheet" href="css/styles.css?v=20260613l">
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="app-layout">
        <main class="main-content">
            <header class="page-header">
                <h2>Sanciones</h2>
                <p>Panel bibliotecario — Consultá las multas y saldá las que correspondan</p>
            </header>

            <div class="form-panel">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="input-dni">Filtrar por DNI <span style="color:var(--text-muted);font-weight:400">(opcional)</span></label>
                        <input type="text" class="form-input" id="input-dni" placeholder="Ej: 40123456" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="check-vigentes">Mostrar</label>
                        <select class="form-input form-select" id="check-vigentes">
                            <option value="vigentes">Solo vigentes (sin saldar)</option>
                            <option value="todas">Todas</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="resultado-sanciones"></div>
        </main>
    </div>

    <script src="js/sidebar.js?v=20260613l"></script>
    <script>renderSidebar('sanciones')</script>
    <script src="js/api.js?v=20260613l"></script>
    <script src="js/sanciones.js?v=20260613l"></script>
</body>
</html>
