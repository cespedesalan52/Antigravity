<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Conocimiento Abierto</title>
    <link rel="stylesheet" href="css/styles.css?v=20260613l">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="sidebar-brand-icon" style="width:56px;height:56px;font-size:28px;margin:0 auto 16px;">📚</div>
                <h1 class="login-title">Conocimiento Abierto</h1>
                <p class="login-subtitle">Biblioteca Universitaria</p>
            </div>

            <div class="form-group">
                <label class="form-label" for="login-email">Email institucional</label>
                <input
                    type="email"
                    class="form-input"
                    id="login-email"
                    placeholder="usuario@universidad.edu.ar"
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">Contraseña</label>
                <input
                    type="password"
                    class="form-input"
                    id="login-password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                >
            </div>

            <button class="btn btn-primary login-btn" id="btn-login">
                Ingresar
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
            </button>

            <div class="login-divider"><span>o</span></div>

            <a href="registro.html" class="btn btn-secondary login-btn" id="btn-ir-registro">
                Crear una cuenta nueva
            </a>

            <p class="login-note">Estudiantes y docentes pueden registrarse. Las cuentas de personal las crea un bibliotecario o administrador.</p>
        </div>
    </div>

    <script src="js/api.js?v=20260613l"></script>
    <script src="js/login.js?v=20260613l"></script>
</body>
</html>
