<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reservas — Conocimiento Abierto. Consultar y gestionar reservas de libros.">
    <title>Reservas — Conocimiento Abierto</title>
    <link rel="stylesheet" href="css/styles.css?v=20260613l">
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="app-layout">
        <main class="main-content">
            <header class="page-header">
                <h2>Reservas</h2>
                <p id="reservas-subtitulo">Consultá las reservas de libros</p>
            </header>

            <!-- Filtros (solo personal) -->
            <div class="form-panel" id="panel-filtros" style="display:none">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="input-dni">Filtrar por DNI <span style="color:var(--text-muted);font-weight:400">(opcional)</span></label>
                        <input type="text" class="form-input" id="input-dni" placeholder="Ej: 40123456" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="select-estado">Estado</label>
                        <select class="form-input form-select" id="select-estado">
                            <option value="">Todas</option>
                            <option value="PENDIENTE">Pendientes</option>
                            <option value="COMPLETADA">Completadas</option>
                            <option value="CANCELADA">Canceladas</option>
                            <option value="EXPIRADA">Expiradas</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="resultado-reservas"></div>
        </main>
    </div>

    <script src="js/sidebar.js?v=20260613l"></script>
    <script>renderSidebar('reservas')</script>
    <script src="js/api.js?v=20260613l"></script>
    <script src="js/reservas.js?v=20260613l"></script>
</body>
</html>
