<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de usuarios — Conocimiento Abierto. Registrar nuevos usuarios y buscar por DNI o nombre.">
    <title>Usuarios — Conocimiento Abierto</title>
    <link rel="stylesheet" href="css/styles.css?v=20260616a">
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="app-layout">
        <main class="main-content">
            <header class="page-header">
                <h2>Gestión de Usuarios</h2>
                <p>Registrar nuevos miembros o consultar usuarios existentes por DNI o nombre</p>
            </header>

            <div class="usuarios-layout">
                <!-- ── Formulario de Registro ─────────── -->
                <div class="form-panel" id="panel-registrar-usuario">
                    <h3 class="form-section-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="8.5" cy="7" r="4"/>
                            <line x1="20" y1="8" x2="20" y2="14"/>
                            <line x1="23" y1="11" x2="17" y2="11"/>
                        </svg>
                        Registrar Nuevo Usuario
                    </h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="input-nombre">Nombre</label>
                            <input type="text" class="form-input" id="input-nombre" placeholder="Ej: Juan" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="input-apellido">Apellido</label>
                            <input type="text" class="form-input" id="input-apellido" placeholder="Ej: García" autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="input-dni">DNI</label>
                        <input type="text" class="form-input" id="input-dni" placeholder="Ej: 40123456" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="input-email">Email</label>
                        <input type="email" class="form-input" id="input-email" placeholder="Ej: juan@universidad.edu.ar" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="input-password">Contraseña</label>
                        <input type="password" class="form-input" id="input-password" placeholder="Mínimo 8 caracteres">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="input-rol">Rol</label>
                        <select class="form-input form-select" id="input-rol">
                            <option value="ESTUDIANTE">Estudiante</option>
                            <option value="DOCENTE">Docente</option>
                            <option value="BIBLIOTECARIO">Bibliotecario</option>
                            <option value="ADMINISTRADOR">Administrador</option>
                        </select>
                    </div>

                    <button class="btn btn-primary" id="btn-registrar" style="width:100%">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="8.5" cy="7" r="4"/>
                            <line x1="20" y1="8" x2="20" y2="14"/>
                            <line x1="23" y1="11" x2="17" y2="11"/>
                        </svg>
                        Registrar Usuario
                    </button>
                </div>

                <!-- ── Buscar Usuario ────────────────── -->
                <div class="form-panel">
                    <h3 class="form-section-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        Buscar Usuario
                    </h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="input-buscar-dni">Por DNI</label>
                            <input type="text" class="form-input" id="input-buscar-dni" placeholder="Ej: 45" autocomplete="off" inputmode="numeric">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="input-buscar-nombre">Por nombre o apellido</label>
                            <input type="text" class="form-input" id="input-buscar-nombre" placeholder="Ej: Alan" autocomplete="off">
                        </div>
                    </div>
                    <div class="form-hint">La búsqueda se ejecuta automáticamente al escribir. Podés combinar ambos campos.</div>
                    <div id="preview-usuario-busqueda"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js?v=20260616a"></script>
    <script>renderSidebar('usuarios')</script>
    <script src="js/api.js?v=20260616a"></script>
    <script src="js/usuarios.js?v=20260616a"></script>
</body>
</html>
